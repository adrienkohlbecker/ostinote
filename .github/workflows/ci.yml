name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# A new push to the same branch supersedes the in-flight run; the matrix's
# macOS/Windows runners are the scarce resource.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.14"
      - run: uv run --locked --group dev ruff check --output-format=github .
      - run: uv run --locked --group dev ruff format --check .

  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python: "3.11" }
          - { os: ubuntu-latest, python: "3.14" }
          - { os: macos-latest, python: "3.14" }
          - { os: windows-latest, python: "3.14" }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: ${{ matrix.python }}
      - run: uv run --locked --group dev pytest -q --durations=10
