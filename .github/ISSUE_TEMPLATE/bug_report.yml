name: Bug report
description: Something isn't working as documented
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Which agent(s)
      multiple: true
      options:
        - Claude Code
        - Codex CLI
        - Other / N/A
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: >
        From `logs/memory-<date>.log` inside the data dir (default
        `~/.ostinote/projects/<slug>/`) and `~/.ostinote/hook-errors.log`.
        Redact anything sensitive — log lines can contain summaries of your
        sessions.
      render: text
  - type: input
    id: version
    attributes:
      label: Versions
      placeholder: "ostinote commit, OS, Python, claude CLI version"
    validations:
      required: true
